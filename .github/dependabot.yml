version: 2

# Keep transitive deps and CI actions current. Weekly cadence so PRs
# don't pile up; group every minor/patch bump into a single PR per
# ecosystem to keep review noise low.

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      runtime:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "deps"
      - "python"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "deps"
      - "ci"
