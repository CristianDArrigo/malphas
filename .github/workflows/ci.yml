name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.7" "mypy>=1.10" "bandit>=1.7"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Mypy (strict bucket via pyproject overrides)
        run: mypy src/malphas/

      - name: Bandit static security scan
        run: bandit -r src/malphas/ -c pyproject.toml -l

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -m "not tor and not slow" -q --tb=short \
            --cov --cov-report=term --cov-fail-under=65
